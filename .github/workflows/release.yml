name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # Without a stable release keystore, every runner signs with its own
      # freshly-generated debug key: each APK gets a different signature and
      # Android refuses the in-place update ("Application non installée",
      # forum #584). Skipped when the secret is absent so forks still build.
      - name: Install release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/tune-upload-keystore.jks
          {
            echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "storeFile=tune-upload-keystore.jks"
          } > android/key.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp build/app/outputs/flutter-apk/app-release.apk "tune-server-${VERSION}-android.apk"
          sha256sum "tune-server-${VERSION}-android.apk" | awk '{print $1}' > "tune-server-${VERSION}-android.apk.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            tune-server-*.apk
            tune-server-*.apk.sha256

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Upload to Firebase App Distribution
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          npm install -g firebase-tools
          firebase appdistribution:distribute \
            "tune-server-${{ steps.version.outputs.version }}-android.apk" \
            --app "${{ secrets.FIREBASE_ANDROID_APP_ID }}" \
            --release-notes "Tune v${{ steps.version.outputs.version }}" \
            --token "${{ secrets.FIREBASE_CI_TOKEN }}"

  build-ios:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "tune-server-${VERSION}-ios.ipa" Payload
          shasum -a 256 "tune-server-${VERSION}-ios.ipa" | awk '{print $1}' > "tune-server-${VERSION}-ios.ipa.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: |
            tune-server-*.ipa
            tune-server-*.ipa.sha256

  release:
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Tune Server Flutter v${{ github.ref_name }}

            ### Downloads
            - **Android**: `tune-server-*-android.apk` — Install directly on your device
            - **iOS**: `tune-server-*-ios.ipa` — Unsigned IPA (for TestFlight, use Xcode to upload)
          files: |
            artifacts/tune-server-*.apk
            artifacts/tune-server-*.apk.sha256
            artifacts/tune-server-*.ipa
            artifacts/tune-server-*.ipa.sha256
