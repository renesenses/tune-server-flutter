name: tune_server
description: "Tune Server — serveur musical multi-room embarqué pour iOS et Android."
publish_to: 'none'
version: 0.7.24+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- Database (drift = GRDB équivalent) ---
  drift: ^2.20.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.26

  # --- WebSocket (remote mode) ---
  web_socket_channel: ^3.0.1

  # --- Audio ---
  just_audio: ^0.10.2
  audio_session: ^0.1.21         # gestion session audio iOS/Android

  # --- HTTP Server embarqué (NWListener → shelf) ---
  shelf: ^1.4.2
  shelf_router: ^1.1.4

  # --- Réseau & Crypto ---
  http: ^1.2.2
  crypto: ^3.0.6                 # MD5 pour Qobuz (= CryptoKit)

  # --- XML (UPnP/DLNA DIDL-Lite) ---
  xml: ^6.5.0

  # --- State management (= @Observable SwiftUI) ---
  provider: ^6.1.2

  # --- Stockage ---
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # --- Background service Android (foreground service) ---
  flutter_foreground_task: ^8.13.0

  # --- Fichiers & Permissions ---
  file_picker: ^8.1.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.13
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true                 # active flutter gen-l10n pour la localisation
